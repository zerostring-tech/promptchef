{{ define "main" }}
<div class="container">
  <article class="single-page">
    <header class="single-header">
      <h1 class="single-title">{{ .Title }}</h1>
      {{ with .Description }}<p class="single-description">{{ . }}</p>{{ end }}
    </header>
    <div class="single-content">
      {{ .Content }}
    </div>
  </article>
</div>
{{ end }}
